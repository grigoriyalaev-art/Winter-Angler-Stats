<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grigoriy Alaev | iOS Developer</title>
<meta name="description" content="Official developer page of Grigoriy Alaev - creator of Winter Angler Stats.">

<style>
:root{
--bg1:#0f2027;
--bg2:#203a43;
--bg3:#2c5364;
--accent:#5fd0ff;
--glass:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}

body{
background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
text-align:center;
}

.container{
background:var(--glass);
backdrop-filter:blur(15px);
padding:40px;
border-radius:25px;
max-width:600px;
width:100%;
box-shadow:0 8px 30px rgba(0,0,0,0.4);
animation:fadeIn 1.5s ease-in-out;
}

h1{
font-size:28px;
margin-bottom:10px;
color:var(--accent);
}

p{opacity:0.9;margin-bottom:15px;}

a{
display:inline-block;
margin:10px;
padding:10px 18px;
border-radius:20px;
text-decoration:none;
background:var(--accent);
color:black;
font-weight:600;
transition:0.3s;
}

a:hover{
background:white;
}

footer{
margin-top:30px;
font-size:14px;
opacity:0.7;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

@media(max-width:500px){
h1{font-size:22px;}
.container{padding:25px;}
}
</style>
</head>
<body>

<div class="container">
<h1>Grigoriy Alaev</h1>
<p>Independent iOS Developer</p>
<p>Creator of <strong>Winter Angler Stats</strong></p>

<a href="marketing.html">About the App</a>
<a href="privacy.html">Privacy Policy</a>
<a href="support.html">Support</a>

<footer>
Contact: grigoriyalaev@gmail.com<br>
© 2026 Grigoriy Alaev
</footer>
</div>

</body>
</html>
